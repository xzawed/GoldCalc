name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

# PR에 여러 번 push될 때 이전 실행 자동 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm run test:coverage
        env:
          # 테스트는 MSW 모킹 사용 — 더미 값으로 충분
          VITE_GOLD_API_KEY: test-key
          VITE_GOLD_API_URL: https://www.goldapi.io/api
          VITE_EXCHANGE_RATE_API_KEY: test-key
          VITE_EXCHANGE_RATE_API_URL: https://v6.exchangerate-api.com/v6
          VITE_ALPHA_VANTAGE_KEY: test-key
          VITE_FRED_API_KEY: test-key

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    needs: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview)
        run: vercel deploy --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IyShhEHO0j8L0gEMVlldsnpK
          VERCEL_PROJECT_ID: prj_MWmdrb56zHVL26ltBM1raQeDpADk

  deploy-production:
    name: Deploy Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://goldcalc-mu.vercel.app

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IyShhEHO0j8L0gEMVlldsnpK
          VERCEL_PROJECT_ID: prj_MWmdrb56zHVL26ltBM1raQeDpADk
