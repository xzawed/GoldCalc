name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm run test:coverage
        env:
          VITE_GOLD_API_KEY: ${{ secrets.VITE_GOLD_API_KEY }}
          VITE_GOLD_API_URL: ${{ secrets.VITE_GOLD_API_URL }}
          VITE_EXCHANGE_RATE_API_KEY: ${{ secrets.VITE_EXCHANGE_RATE_API_KEY }}
          VITE_EXCHANGE_RATE_API_URL: ${{ secrets.VITE_EXCHANGE_RATE_API_URL }}

      - name: Build
        run: npm run build
        env:
          VITE_GOLD_API_KEY: ${{ secrets.VITE_GOLD_API_KEY }}
          VITE_GOLD_API_URL: ${{ secrets.VITE_GOLD_API_URL }}
          VITE_EXCHANGE_RATE_API_KEY: ${{ secrets.VITE_EXCHANGE_RATE_API_KEY }}
          VITE_EXCHANGE_RATE_API_URL: ${{ secrets.VITE_EXCHANGE_RATE_API_URL }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
